name: th_bundle
description: "T&H BUNDLE - Fast, Reliable & Affordable Digital Services"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.1.4

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Local storage / secure storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Auth / biometrics
  local_auth: ^2.2.0

  # Firebase
  firebase_core: ^2.31.0
  firebase_messaging: ^14.9.3

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  pin_code_fields: ^8.0.1
  fl_chart: ^0.68.0
  lottie: ^3.1.2

  # Utilities
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  pdf: ^3.11.0
  path_provider: ^2.1.3
  open_filex: ^4.4.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.3
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
