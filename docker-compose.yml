version: "3.9"

services:
  api:
    build: ./backend
    container_name: thbundle-api
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/logs:/usr/src/app/logs
    networks:
      - thbundle-net

  postgres:
    image: postgres:15-alpine
    container_name: thbundle-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: thbundle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docs/DATABASE_SCHEMA.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - thbundle-net

  redis:
    image: redis:7-alpine
    container_name: thbundle-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - thbundle-net

  nginx:
    image: nginx:alpine
    container_name: thbundle-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./admin-dashboard/dist:/usr/share/nginx/html
    depends_on:
      - api
    networks:
      - thbundle-net

networks:
  thbundle-net:
    driver: bridge

volumes:
  pgdata:
