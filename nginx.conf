server {
    listen 80;
    server_name api.thbundle.com admin.thbundle.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.thbundle.com;

    ssl_certificate     /etc/letsencrypt/live/api.thbundle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.thbundle.com/privkey.pem;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Basic request throttling at the edge, on top of app-level rate limiting.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    location /api/v1/auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api:4000;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.thbundle.com;

    ssl_certificate     /etc/letsencrypt/live/admin.thbundle.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.thbundle.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
